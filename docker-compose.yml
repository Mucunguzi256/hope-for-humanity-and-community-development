services:

  db:
    image: mysql:8.0
    container_name: hope_db
    restart: always
    environment:
      MYSQL_DATABASE: hope_for_humanity
      MYSQL_USER: hfh_user
      MYSQL_PASSWORD: hfh_password123
      MYSQL_ROOT_PASSWORD: root_pass
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - hope_network

  wordpress:
    image: wordpress:php8.2-apache
    container_name: hope_wordpress
    restart: always
    depends_on:
      - db
    ports:
      - "8090:80"
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_NAME: hope_for_humanity
      WORDPRESS_DB_USER: hfh_user
      WORDPRESS_DB_PASSWORD: hfh_password123
      WORDPRESS_TABLE_PREFIX: wp_
    volumes:
      - ./wp-content:/var/www/html/wp-content
      - wordpress_data:/var/www/html
    networks:
      - hope_network

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: hope_phpmyadmin
    restart: always
    depends_on:
      - db
    ports:
      - "8091:80"
    environment:
      PMA_HOST: db
      MYSQL_ROOT_PASSWORD: root_pass
    networks:
      - hope_network

volumes:
  db_data:
  wordpress_data:

networks:
  hope_network:
    driver: bridge
